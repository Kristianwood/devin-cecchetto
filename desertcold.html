<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DESERT COLD — first look</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B5%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Karla:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;min-height:100svh;background:#0e0a08;color:#e8d5c8;font-family:'Karla',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
@keyframes riseUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.kick{margin:0;font-size:11px;letter-spacing:.44em;text-transform:uppercase;color:#b9a49a;animation:riseUp 1s ease .2s both}
h1{margin:8px 0 26px;font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(40px,8vw,88px);letter-spacing:.16em;color:#f7f2ec;animation:riseUp 1s ease .4s both}
.frame{width:min(1080px,96vw);border-radius:14px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.6);animation:riseUp 1.1s ease .6s both;position:relative}
video{display:block;width:100%;height:auto;background:#000}
.unmute{position:absolute;right:14px;bottom:14px;font:inherit;font-size:11px;letter-spacing:.2em;text-transform:uppercase;background:rgba(14,10,8,.78);color:#e8d5c8;border:1px solid rgba(232,213,200,.35);border-radius:999px;padding:9px 18px;cursor:pointer}
.note{margin:26px 0 0;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#8a6f5f;animation:riseUp 1s ease .9s both}
.note a{color:#b9a49a;text-decoration:none;border-bottom:1px solid #4a3c32;padding-bottom:2px}
.presave{margin:34px 0 0;max-width:520px;width:min(520px,94vw);background:rgba(247,242,236,.06);border:1px solid rgba(232,213,200,.28);border-radius:18px;padding:30px 32px;text-align:center;opacity:0;transform:translateY(26px);visibility:hidden;transition:opacity 2.4s ease, transform 2.4s cubic-bezier(.2,.8,.3,1), visibility 0s linear 2.4s}
.presave.show{opacity:1;transform:none;visibility:visible;transition:opacity 2.4s ease, transform 2.4s cubic-bezier(.2,.8,.3,1)}
.presave .pk{margin:0;font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:#b9a49a}
.presave h2{margin:10px 0 8px;font-family:'Cormorant Garamond',serif;font-weight:500;font-style:italic;font-size:30px;color:#f7f2ec}
.presave p{margin:0 0 20px;font-size:14px;font-weight:300;line-height:1.7;color:#d9c2b8}
.presave a.btn{display:inline-block;padding:14px 34px;border-radius:999px;background:#e8d5c8;color:#26201c;font-size:12px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;text-decoration:none;transition:transform .4s}
.presave a.btn:hover{transform:translateY(-4px)}
</style>
</head>
<body>
<p class="kick">You found it &mdash; shh</p>
<h1>DESERT COLD</h1>
<div class="frame">
  <video id="v" src="assets/teaser.mp4" autoplay muted loop playsinline></video>
  <button class="unmute" id="unmute">&#128266; Sound on</button>
</div>
<div class="presave" id="presave">
  <p class="pk">Like what you heard?</p>
  <h2>Be first in line</h2>
  <p>Pre-save DESERT COLD and it lands in your library the moment it drops.</p>
  <a class="btn" href="https://distrokid.com/hyperfollow/devincecchetto/desert-cold" target="_blank" rel="noopener">Pre-save Desert Cold</a>
</div>
<p class="note">First look &middot; the single &amp; video arrive soon &middot; <a href="./">devincecchetto.com</a></p>
<script>
var v = document.getElementById('v'), b = document.getElementById('unmute');
b.addEventListener('click', function () {
  v.muted = !v.muted;
  if (!v.muted) v.play();
  b.innerHTML = v.muted ? '&#128266; Sound on' : '&#128263; Mute';
});
/* reveal the pre-save box only after one full watch (the video loops):
   catch either the last moments of playback or the loop wrapping around */
var revealed = false, lastT = 0;
v.addEventListener('timeupdate', function () {
  if (!revealed && v.duration &&
      (v.currentTime > v.duration - 0.45 || v.currentTime < lastT - 2)) {
    revealed = true;
    document.getElementById('presave').classList.add('show');
    if (window.goatcounter && goatcounter.count) goatcounter.count({ path: 'Teaser → watched fully', event: true });
  }
  lastT = v.currentTime;
});
/* analytics (enabled once a GoatCounter code is configured in the admin panel) */
fetch('content.json').then(function (r) { return r.json(); }).then(function (c) {
  if (!c.goatcounter) return;
  var s = document.createElement('script');
  s.async = true;
  s.src = 'https://gc.zgo.at/count.js';
  s.setAttribute('data-goatcounter', 'https://' + c.goatcounter + '.goatcounter.com/count');
  document.head.appendChild(s);
});
document.querySelector('.presave a.btn').addEventListener('click', function () {
  if (window.goatcounter && goatcounter.count) goatcounter.count({ path: 'Pre-save → Desert Cold', event: true });
});
</script>
</body>
</html>
